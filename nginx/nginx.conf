worker_processes auto;
events { worker_connections 1024; }

http {
  include      mime.types;
  default_type application/octet-stream;
  sendfile     on;
  gzip         on;
  gzip_types   text/plain application/json application/javascript text/css;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

  upstream backend_rest { server backend:3000; }
  upstream backend_ws   { server backend:3000; }
  upstream frontend_app { server frontend:80; }

  server {
    listen 80;
    server_name kurohub.fahmyalmaliki.uk;

    # ─── Real IP dari Cloudflare ────────────────────────
    real_ip_header      X-Forwarded-For;
    real_ip_recursive   on;
    set_real_ip_from    0.0.0.0/0;

    # ─── REST API ────────────────────────────────────────
    location /api/ {
      proxy_pass           http://backend_rest;
      proxy_set_header     Host $host;
      proxy_set_header     X-Real-IP $remote_addr;
      proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      limit_req            zone=api_limit burst=20 nodelay;
    }

    # ─── Health endpoints ───────────────────────────────
    location /api/health {
      proxy_pass           http://backend_rest;
      proxy_set_header     Host $host;
    }

    # ─── WebSocket dashboard (browser) ─────────────────
    location /ws/dashboard {
      proxy_pass           http://backend_ws;
      proxy_http_version   1.1;
      proxy_set_header     Upgrade $http_upgrade;
      proxy_set_header     Connection "upgrade";
      proxy_set_header     Host $host;
      proxy_set_header     X-Real-IP $remote_addr;
      proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      proxy_read_timeout   3600s;
      proxy_send_timeout   3600s;
    }

    # ─── WebSocket device (ESP32) ──────────────────────
    location /ws/device {
      proxy_pass           http://backend_ws;
      proxy_http_version   1.1;
      proxy_set_header     Upgrade $http_upgrade;
      proxy_set_header     Connection "upgrade";
      proxy_set_header     Host $host;
      proxy_set_header     X-Real-IP $remote_addr;
      proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      proxy_read_timeout   3600s;
      proxy_send_timeout   3600s;
    }

    # ─── Frontend SPA ────────────────────────────────────
    location / {
      proxy_pass           http://frontend_app;
      proxy_set_header     Host $host;
      proxy_set_header     X-Real-IP $remote_addr;
      proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
    }
  }
}
